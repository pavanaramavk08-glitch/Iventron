<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Header and Footer Example</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Header Styling */
        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        /* Main Content */
        main {
            padding: 40px;
            text-align: center;
        }

        /* Footer Styling */
        footer {
            background-color: #34495e;
            color: white;
            padding: 30px 20px;
        }

        .footer-container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .footer-article {
            width: 250px;
            margin: 10px;
        }

        .footer-article h3 {
            border-bottom: 2px solid white;
            padding-bottom: 5px;
        }

        .copyright {
            text-align: center;
            margin-top: 20px;
            border-top: 1px solid white;
            padding-top: 10px;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header>
        <h1>My Website Header</h1>
        <p>Welcome to my website</p>
    </header>

    <!-- Main Content -->
    <main>
        <h2>Main Content Area</h2>
        <p>This is the body section of the webpage.</p>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-container">
            
            <div class="footer-article">
                <h3>Article 1</h3>
                <p>This is the description of Article 1.</p>
            </div>

            <div class="footer-article">
                <h3>Article 2</h3>
                <p>This is the description of Article 2.</p>
            </div>

            <div class="footer-article">
                <h3>Article 3</h3>
                <p>This is the description of Article 3.</p>
            </div>

        </div>

        <div class="copyright">
            <p>© 2026 My Website | All Rights Reserved</p>
        </div>
    </footer>

</body>
</html>
